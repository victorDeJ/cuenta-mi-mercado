  </h1>

  <hr>

  @if (pendingList()) {
    <button class="btn btn-primary fw-semibold w-100 mt-2 shadow-sm"
    (click)="navigateToPage('groceries-list')"
    > 
      <i class="bi bi-play-circle-fill me-1"></i>
      {{ 'HOME.CONTINUE_SHOP' | translate }} 
    </button>
  }

  <button class="btn btn-primary fw-semibold w-100 mt-2 shadow-sm"
  (click)="onRegisterShop()"
  > 
    <i class="bi bi-plus-circle-fill me-1"></i>
    {{ 'HOME.REGISTER_GROCERIES' | translate }} 
  </button>

  <hr>

  <button class="btn btn-primary fw-semibold w-100 mt-2 shadow-sm"
  (click)="navigateToPage('groceries-list-historical')"
  >
    <i class="bi bi-file-text-fill me-1"></i>
    {{ 'HOME.GROCERIES_LIST_HISTORICAL' | translate }} 
  </button>
  <button class="btn btn-primary fw-semibold w-100 mt-2 shadow-sm"
  (click)="navigateToPage('exchange-rate')"
  > 
    <i class="bi bi-currency-exchange me-1"></i>
    {{ 'HOME.EXCHANGE_RATE' | translate }} 
  </button>

</div>

<ng-template #pendingListModal>
  <div id="PendingListContainer" 
  class="border border-primary bg-primary-subtle rounded p-3 mt-2 shadow-sm overflow-hidden"
  >
    <div class="text-center text-primary fw-bold w-100 position-relative">
      <h3>
        {{ 'HOME.PENDING_SHOP_TITLE' | translate }}
      </h3>
      <button class="btn btn-primary btn-sm bi bi-x-circle-fill text-white shadow-sm position-absolute top-0 end-0"
      (click)="onCancel()"
      ></button>
    </div>
    
    <div class="py-3 text-center text-primary fw-semibold">
      {{ 'HOME.PENDING_SHOP_MESSAGE' | translate }}
    </div>

    <div class="d-flex flex-column gap-2 mt-2">
      <button class="btn btn-primary shadow-sm text-white fw-bold w-100"
      (click)="onContinue()"
      >
        <i class="bi bi-play-circle-fill me-1"></i>
        {{ 'HOME.ACCEPT_AND_CONTINUE' | translate }}
      </button>

      <button class="btn btn-danger shadow-sm text-white fw-bold w-100" 
      (click)="onDiscard()"
      >
        <i class="bi bi-trash-fill me-1"></i>
        {{ 'HOME.DISCARD_SHOP' | translate }}
      </button>

      <button class="btn btn-outline-primary shadow-sm fw-bold w-100" 
      (click)="onCancel()"
      >
        <i class="bi bi-x-circle-fill me-1"></i>
        {{ 'GENERAL.CANCEL' | translate }}
      </button>
    </div>
  </div>
</ng-template>
